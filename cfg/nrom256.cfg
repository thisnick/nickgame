# NROM-256 linker config for ca65/ld65
# PRG: 32KB at $8000-$FFFF
# CHR: 8KB

MEMORY {
    ZP:      start = $00,    size = $100,   type = rw, define = yes;
    OAMBUF:  start = $0200,  size = $100,   type = rw;
    RAM:     start = $0300,  size = $500,   type = rw, define = yes;
    HDR:     start = $0000,  size = $10,    type = ro, file = %O, fill = yes, fillval = $00;
    PRG:     start = $8000,  size = $8000,  type = ro, file = %O, fill = yes, fillval = $FF;
    CHR:     start = $0000,  size = $2000,  type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    OAMBUF:   load = OAMBUF, type = bss, define = yes;
    BSS:      load = RAM, type = bss;
    HEADER:   load = HDR, type = ro,  offset = $0000;
    CODE:     load = PRG, type = ro;
    RODATA:   load = PRG, type = ro;
    VECTORS:  load = PRG, type = ro,  start = $FFFA;
    CHARS:    load = CHR, type = ro;
}
