<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>余生 — Chapter 2: Bicycle Dash 🚲</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0ff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    width: 100%;
    text-align: center;
    padding: 12px 8px 6px;
    background: linear-gradient(135deg, #16213e, #0f3460);
    border-bottom: 2px solid #e94560;
  }
  header h1 {
    font-size: 1.4em;
    color: #e94560;
    letter-spacing: 2px;
  }
  header p {
    font-size: 0.7em;
    color: #aaa;
    margin-top: 4px;
  }
  #canvas-wrap {
    position: relative;
    margin: 12px auto;
    border: 3px solid #e94560;
    box-shadow: 0 0 30px rgba(233,69,96,0.4);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #nes-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e94560;
    font-size: 1em;
    z-index: 10;
  }
  #loading-overlay .spinner {
    width: 40px; height: 40px;
    border: 4px solid #333;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Controls */
  #controls {
    width: 100%;
    max-width: 512px;
    padding: 8px 16px 24px;
    user-select: none;
    -webkit-user-select: none;
  }
  .ctrl-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .dpad {
    display: grid;
    grid-template-columns: 48px 48px 48px;
    grid-template-rows: 48px 48px 48px;
    gap: 4px;
  }
  .dpad-btn {
    background: #0f3460;
    border: 2px solid #e94560;
    border-radius: 8px;
    color: #e0e0ff;
    font-size: 1.2em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    transition: background 0.1s;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: #e94560;
    color: #fff;
  }
  .dpad-center { background: transparent; border: none; }

  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .ab-row {
    display: flex;
    gap: 16px;
  }
  .action-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    font-size: 0.85em;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    transition: transform 0.1s, filter 0.1s;
  }
  .action-btn:active, .action-btn.pressed {
    transform: scale(0.9);
    filter: brightness(1.3);
  }
  .btn-a { background: #e94560; color: #fff; }
  .btn-b { background: #533483; color: #fff; }
  .btn-b-label { font-size: 0.65em; margin-top: 3px; }

  .sys-btns {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }
  .sys-btn {
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 12px;
    padding: 6px 18px;
    font-size: 0.75em;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .sys-btn:active, .sys-btn.pressed {
    background: #555;
    color: #fff;
  }

  .hints {
    margin-top: 16px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-size: 0.65em;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }
  .hints b { color: #e94560; }

  /* Keyboard hint */
  #kb-hint {
    margin-top: 6px;
    font-size: 0.62em;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>🚲 余生 · Chapter 2</h1>
  <p>Bicycle Dash — 上学路 · Road to School</p>
</header>

<div id="canvas-wrap">
  <canvas id="nes-canvas" width="256" height="240"></canvas>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading emulator…</div>
  </div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <!-- D-Pad -->
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" id="btn-up" data-key="ArrowUp">▲</button>
      <div></div>
      <button class="dpad-btn" id="btn-left" data-key="ArrowLeft">◀</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="btn-right" data-key="ArrowRight">▶</button>
      <div></div>
      <button class="dpad-btn" id="btn-down" data-key="ArrowDown">▼</button>
      <div></div>
    </div>

    <!-- System buttons -->
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div class="sys-btns">
        <button class="sys-btn" id="btn-select" data-nes="select">SELECT</button>
        <button class="sys-btn" id="btn-start" data-nes="start">START</button>
      </div>
    </div>

    <!-- A/B -->
    <div class="action-btns">
      <div class="ab-row">
        <div style="text-align:center">
          <button class="action-btn btn-b" id="btn-b" data-nes="b">B</button>
          <div class="btn-b-label" style="color:#aaa;font-size:0.6em">brake</div>
        </div>
        <div style="text-align:center">
          <button class="action-btn btn-a" id="btn-a" data-nes="a">A</button>
          <div class="btn-b-label" style="color:#aaa;font-size:0.6em">pedal!</div>
        </div>
      </div>
    </div>
  </div>

  <div class="hints">
    <b>▲▼</b> Switch lanes &nbsp;|&nbsp; <b>A</b> Pedal faster &nbsp;|&nbsp; <b>B</b> Brake<br>
    Dodge obstacles 🕳️🐕🛒 &nbsp;|&nbsp; Collect 包子 🥟 for points<br>
    Reach school before the bell! ⏰
  </div>
  <div id="kb-hint">Keyboard: Arrow keys + Z (A) + X (B) + Enter (Start)</div>
</div>

<!-- JSNES via CDN -->
<script src="https://cdn.jsdelivr.net/npm/jsnes@1.1.1/dist/jsnes.min.js"></script>
<script>
(async function() {
  const canvas = document.getElementById('nes-canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('loading-overlay');
  const loadingText = document.getElementById('loading-text');

  // Scale canvas for the screen
  function scaleCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    const maxW = Math.min(window.innerWidth - 8, 512);
    const scale = Math.max(1, Math.floor(maxW / 256));
    const dispW = 256 * scale;
    const dispH = 240 * scale;
    canvas.style.width = dispW + 'px';
    canvas.style.height = dispH + 'px';
    wrap.style.width = dispW + 'px';
    wrap.style.height = dispH + 'px';
  }
  scaleCanvas();
  window.addEventListener('resize', scaleCanvas);

  // Load ROM
  loadingText.textContent = 'Loading nickgame.nes…';
  let romData;
  try {
    const resp = await fetch('nickgame.nes');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf = await resp.arrayBuffer();
    romData = new Uint8Array(buf);
    loadingText.textContent = `ROM loaded (${(buf.byteLength/1024).toFixed(1)} KB) — starting…`;
  } catch(e) {
    loadingText.innerHTML = `<span style="color:#f88">Failed to load ROM:<br>${e.message}</span>`;
    return;
  }

  // Frame buffer
  const imageData = ctx.createImageData(256, 240);
  const buf32 = new Uint32Array(imageData.data.buffer);

  // Init JSNES
  const nes = new jsnes.NES({
    onFrame: function(frameBuffer) {
      for (let i = 0; i < frameBuffer.length; i++) {
        buf32[i] = 0xFF000000 | frameBuffer[i];
      }
      ctx.putImageData(imageData, 0, 0);
    },
    onAudioSample: function(l, r) {
      // Audio disabled for simplicity
    }
  });

  // Load ROM bytes
  let romStr = '';
  for (let i = 0; i < romData.length; i++) {
    romStr += String.fromCharCode(romData[i]);
  }
  nes.loadROM(romStr);

  // Hide overlay
  overlay.style.display = 'none';

  // Game loop: 60fps
  let lastTime = 0;
  function gameLoop(timestamp) {
    if (timestamp - lastTime >= 16) {
      nes.frame();
      lastTime = timestamp;
    }
    requestAnimationFrame(gameLoop);
  }
  requestAnimationFrame(gameLoop);

  // ---- Input Handling ----
  // JSNES button constants
  const BTNS = {
    a:      jsnes.Controller.BUTTON_A,
    b:      jsnes.Controller.BUTTON_B,
    select: jsnes.Controller.BUTTON_SELECT,
    start:  jsnes.Controller.BUTTON_START,
    up:     jsnes.Controller.BUTTON_UP,
    down:   jsnes.Controller.BUTTON_DOWN,
    left:   jsnes.Controller.BUTTON_LEFT,
    right:  jsnes.Controller.BUTTON_RIGHT,
  };

  function press(btn) {
    if (BTNS[btn] !== undefined) {
      nes.buttonDown(1, BTNS[btn]);
    }
  }
  function release(btn) {
    if (BTNS[btn] !== undefined) {
      nes.buttonUp(1, BTNS[btn]);
    }
  }

  // Keyboard
  const keyMap = {
    'ArrowUp':    'up',
    'ArrowDown':  'down',
    'ArrowLeft':  'left',
    'ArrowRight': 'right',
    'z': 'a', 'Z': 'a',
    'x': 'b', 'X': 'b',
    'Enter': 'start',
    'Shift': 'select',
  };
  document.addEventListener('keydown', e => {
    const btn = keyMap[e.key];
    if (btn) { e.preventDefault(); press(btn); }
  });
  document.addEventListener('keyup', e => {
    const btn = keyMap[e.key];
    if (btn) { release(btn); }
  });

  // Touch/mouse for on-screen buttons
  function setupButton(el, btnName) {
    function onDown(e) {
      e.preventDefault();
      el.classList.add('pressed');
      press(btnName);
    }
    function onUp(e) {
      e.preventDefault();
      el.classList.remove('pressed');
      release(btnName);
    }
    el.addEventListener('touchstart', onDown, {passive: false});
    el.addEventListener('touchend', onUp, {passive: false});
    el.addEventListener('touchcancel', onUp, {passive: false});
    el.addEventListener('mousedown', onDown);
    el.addEventListener('mouseup', onUp);
    el.addEventListener('mouseleave', onUp);
  }

  // D-pad buttons
  setupButton(document.getElementById('btn-up'), 'up');
  setupButton(document.getElementById('btn-down'), 'down');
  setupButton(document.getElementById('btn-left'), 'left');
  setupButton(document.getElementById('btn-right'), 'right');

  // Action buttons
  setupButton(document.getElementById('btn-a'), 'a');
  setupButton(document.getElementById('btn-b'), 'b');
  setupButton(document.getElementById('btn-select'), 'select');
  setupButton(document.getElementById('btn-start'), 'start');

})();
</script>
</body>
</html>
